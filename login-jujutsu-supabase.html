<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu • Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        .gojo-bg {
            background: radial-gradient(circle at center, #0a1625 0%, #02070f 70%);
        }
        .six-eyes {
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.6), 0 0 50px rgba(0, 245, 255, 0.3);
        }
        .form-input {
            transition: all 0.2s ease;
        }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.2);
            border-color: #00f5ff;
        }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-white gojo-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div onclick="easterEgg()" class="w-16 h-16 rounded-3xl bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-500 flex items-center justify-center six-eyes cursor-pointer">
                    <i class="fa-solid fa-eye text-white text-4xl"></i>
                </div>
            </div>
            <h1 class="title-font text-4xl font-semibold tracking-tighter">Jujutsu Kaisen</h1>
            <p class="text-cyan-400 text-sm tracking-[4px] font-medium mt-1">SIX EYES ACCESS</p>
        </div>

        <div class="bg-zinc-900/90 border border-white/10 rounded-3xl p-8 shadow-2xl">
            
            <!-- LOGIN -->
            <div id="login-section" class="section active">
                <h2 class="text-2xl font-semibold mb-1">Bienvenido de vuelta</h2>
                <p class="text-zinc-400 text-sm mb-6">Inicia sesión en el dominio</p>

                <!-- Google -->
                <button onclick="signInWithGoogle()" 
                        class="w-full flex items-center justify-center gap-x-3 py-3.5 bg-white text-zinc-900 font-semibold rounded-2xl mb-5 active:scale-[0.985]">
                    <i class="fa-brands fa-google text-xl"></i>
                    <span>Continuar con Google</span>
                </button>

                <div class="flex items-center gap-4 mb-5">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-xs text-zinc-500">o con correo</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <form onsubmit="signInWithEmail(event)">
                    <div class="space-y-4">
                        <div>
                            <input type="email" id="login-email" placeholder="Correo electrónico" 
                                   class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm" required>
                        </div>
                        <div>
                            <input type="password" id="login-password" placeholder="Contraseña" 
                                   class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm" required>
                        </div>
                    </div>

                    <div class="flex justify-end mt-2 mb-5">
                        <button type="button" onclick="showSection('forgot-section')" class="text-xs text-cyan-400 hover:underline">¿Olvidaste tu contraseña?</button>
                    </div>

                    <button type="submit" 
                            class="w-full py-3.5 bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-bold rounded-2xl active:scale-[0.985]">
                        Iniciar Sesión
                    </button>
                </form>

                <div class="text-center mt-6 text-sm">
                    <span class="text-zinc-400">¿No tienes cuenta?</span>
                    <button onclick="showSection('register-section')" class="ml-1 text-cyan-400 font-medium">Crear cuenta</button>
                </div>
            </div>

            <!-- REGISTER -->
            <div id="register-section" class="section">
                <h2 class="text-2xl font-semibold mb-6">Crear Cuenta</h2>
                <form onsubmit="signUp(event)">
                    <div class="space-y-4">
                        <input type="text" id="reg-name" placeholder="Nombre completo" class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm" required>
                        <input type="email" id="reg-email" placeholder="Correo electrónico" class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm" required>
                        <input type="password" id="reg-password" placeholder="Contraseña (mínimo 6 caracteres)" class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm" required>
                    </div>
                    <button type="submit" class="mt-6 w-full py-3.5 bg-white text-zinc-900 font-bold rounded-2xl active:scale-[0.985]">
                        Crear Cuenta
                    </button>
                </form>
                <button onclick="showSection('login-section')" class="mt-5 text-sm text-zinc-400 hover:text-white block mx-auto">← Volver al login</button>
            </div>

            <!-- FORGOT PASSWORD -->
            <div id="forgot-section" class="section">
                <h2 class="text-2xl font-semibold mb-2">Recuperar contraseña</h2>
                <p class="text-zinc-400 text-sm mb-5">Te enviaremos un enlace para restablecerla</p>
                
                <form onsubmit="resetPassword(event)">
                    <input type="email" id="forgot-email" placeholder="Tu correo electrónico" 
                           class="form-input w-full bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm mb-4" required>
                    <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-bold rounded-2xl">
                        Enviar enlace
                    </button>
                </form>
                <button onclick="showSection('login-section')" class="mt-5 text-sm text-zinc-400 hover:text-white block mx-auto">← Volver</button>
            </div>

            <!-- Success -->
            <div id="success-box" class="hidden mt-6 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl text-center">
                <i class="fa-solid fa-check-circle text-emerald-400 text-2xl mb-2"></i>
                <p id="success-text" class="text-emerald-400 text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURA TUS DATOS DE SUPABASE AQUÍ ====================
        const SUPABASE_URL = 'https://mtffjwaybktpwbavsvoa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_KMYTWIg_xZq_0CzNFqEyPA__uD351gu';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            document.getElementById('success-box').classList.add('hidden');
        }

        function showSuccess(msg) {
            const box = document.getElementById('success-box');
            document.getElementById('success-text').textContent = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        // Google Login
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin.replace('login-jujutsu-supabase.html', 'dashboard-jujutsu.html')
                }
            });
            if (error) alert("Error con Google: " + error.message);
        }

        // Email Login
        async function signInWithEmail(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert(error.message);
            } else {
                window.location.href = 'dashboard-jujutsu.html';
            }
        }

        // Register
        async function signUp(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: name }
                }
            });

            if (error) {
                alert(error.message);
            } else {
                showSuccess("Cuenta creada. Revisa tu correo para confirmar.");
                setTimeout(() => showSection('login-section'), 2500);
            }
        }

        // Password Reset
        async function resetPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin
            });

            if (error) {
                alert(error.message);
            } else {
                showSuccess("Revisa tu correo. Te enviamos el enlace de recuperación.");
                setTimeout(() => showSection('login-section'), 3000);
            }
        }

        function easterEgg() {
            const eye = document.querySelector('.six-eyes i');
            eye.classList.add('fa-spin');
            setTimeout(() => eye.classList.remove('fa-spin'), 1500);
        }

        // Auto redirect if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard-jujutsu.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
